<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nell Code Storage Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        .ios-blur { backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .tab-active { color: #3b82f6; transform: translateY(-4px); }
        .ios-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 30px; }
        .ios-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .tab-content { display: none; animation: slideUp 0.5s ease; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass { background: rgba(28, 28, 30, 0.8); border: 1px solid rgba(56, 56, 58, 0.5); }
        
        .banner-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
    </style>
</head>
<body class="bg-[#f2f2f7] dark:bg-black min-h-screen text-gray-900 dark:text-gray-100 transition-colors duration-300 pb-24">

    <header class="sticky top-0 z-40 ios-blur bg-white/70 dark:bg-black/70 p-4 border-b dark:border-gray-800 flex justify-between items-center">
        <div class="px-2 flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center text-white font-bold italic">N</div>
            <div>
                <h1 id="pageTitle" class="text-lg font-bold leading-tight">Beranda</h1>
                <p id="snippetCount" class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">0 Snippets</p>
            </div>
        </div>
        <button onclick="toggleDarkMode()" class="p-3 rounded-2xl bg-white dark:bg-gray-800 shadow-sm transition-all active:scale-90">
            <i data-lucide="sun" class="w-5 h-5 hidden dark:block text-yellow-400"></i>
            <i data-lucide="moon" class="w-5 h-5 dark:hidden text-indigo-600"></i>
        </button>
    </header>

    <div id="tab-home" class="tab-content active p-4 md:p-6 max-w-5xl mx-auto">
        <div class="banner-gradient rounded-[32px] p-6 mb-8 text-white shadow-xl shadow-blue-500/20 flex flex-col md:flex-row justify-between items-center gap-4 relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-2xl font-bold">Halo, Nell! 👋</h2>
                <p class="text-white/80 text-sm mt-1">Simpan dan kelola library code-mu dengan rapi.</p>
                <button onclick="switchTab('add', 'Tambah')" class="mt-4 bg-white text-blue-600 px-6 py-2 rounded-full text-xs font-bold shadow-lg">Mulai Simpan</button>
            </div>
            <i data-lucide="code" class="w-32 h-32 absolute -right-4 -bottom-4 text-white/10 rotate-12"></i>
        </div>

        <div class="mb-8 space-y-4">
            <div class="relative">
                <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                <input type="text" id="searchInput" oninput="filterCards()" placeholder="Cari code atau tag..." class="w-full p-5 pl-14 rounded-3xl bg-white dark:bg-gray-900 border-none shadow-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
        </div>

        <div id="codeGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="p-10 text-center col-span-full text-gray-400">Memuat database...</div>
        </div>
    </div>

    <div id="tab-add" class="tab-content p-4 md:p-6 max-w-3xl mx-auto">
        <div class="glass p-6 rounded-[35px] space-y-4 shadow-2xl relative">
            <h2 id="formTitle" class="text-xl font-bold text-blue-500 px-2">Tambah Code</h2>
            
            <div id="dropZone" class="border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-[30px] p-8 flex flex-col items-center justify-center gap-3 hover:border-blue-500 transition-all cursor-pointer bg-white/40 dark:bg-gray-800/20">
                <i data-lucide="upload-cloud" class="w-10 h-10 text-blue-500"></i>
                <p class="text-sm font-medium">Upload File HTML/JS/CSS</p>
                <input type="file" id="fileInput" class="hidden" accept=".html,.css,.js,.txt">
            </div>

            <div class="space-y-4">
                <input type="hidden" id="editId">
                <input type="text" id="codeTitle" placeholder="Nama Project" class="w-full p-4 rounded-2xl bg-gray-100 dark:bg-gray-800 border-none outline-none focus:ring-2 focus:ring-blue-500">
                
                <div class="grid grid-cols-2 gap-3">
                    <select id="codeLang" class="p-4 rounded-2xl bg-gray-100 dark:bg-gray-800 border-none outline-none">
                        <option value="html">HTML</option>
                        <option value="js">JavaScript</option>
                        <option value="css">CSS</option>
                        <option value="other">Lainnya</option>
                    </select>
                    <input type="text" id="codeTags" placeholder="Tags (koma)" class="p-4 rounded-2xl bg-gray-100 dark:bg-gray-800 border-none outline-none">
                </div>

                <div class="group relative">
                    <textarea id="codeContent" placeholder="Paste kode di sini..." class="w-full h-80 p-5 font-mono text-xs rounded-3xl bg-gray-950 text-green-400 border-none outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    <button onclick="beautifyCode()" class="absolute top-4 right-4 p-2 bg-gray-800 text-white rounded-lg text-[10px] opacity-0 group-hover:opacity-100 transition-opacity">BEAUTIFY</button>
                </div>

                <textarea id="codeCDN" placeholder="External CDN (Opsional)..." class="w-full h-20 p-4 rounded-2xl bg-gray-100 dark:bg-gray-800 border-none outline-none text-xs"></textarea>
                
                <div class="flex gap-2">
                    <button onclick="saveToFirestore()" id="btnSave" class="flex-grow bg-blue-500 hover:bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-500/30 transition-all active:scale-95">Simpan Snippet</button>
                    <button id="btnCancelEdit" onclick="cancelEdit()" class="hidden bg-gray-200 dark:bg-gray-800 px-6 py-4 rounded-2xl font-bold text-sm">Batal</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-admin" class="tab-content p-4 md:p-6 max-w-lg mx-auto">
        <div class="bg-white dark:bg-gray-900 rounded-[40px] p-8 shadow-sm text-center">
            <div class="w-24 h-24 bg-blue-50 dark:bg-blue-900/20 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="layout-dashboard" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">Nell OS Admin</h2>
            <p class="text-gray-500 text-xs mb-8">V.1.0 PRO • Built with Firebase</p>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="p-4 bg-gray-50 dark:bg-gray-800 rounded-3xl">
                    <p id="statTotal" class="text-xl font-bold">0</p>
                    <p class="text-[10px] text-gray-400 uppercase">Total Code</p>
                </div>
                <div class="p-4 bg-gray-50 dark:bg-gray-800 rounded-3xl">
                    <p id="statToday" class="text-xl font-bold text-green-500">Live</p>
                    <p class="text-[10px] text-gray-400 uppercase">Status</p>
                </div>
            </div>

            <div class="space-y-3">
                <button onclick="exportJSON()" class="w-full p-4 bg-gray-100 dark:bg-gray-800 rounded-2xl flex items-center justify-between font-bold text-sm active:scale-95 transition-all">
                    <span class="flex items-center gap-2"><i data-lucide="download" class="w-4 h-4"></i> Export Data</span>
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </button>
                <button onclick="location.reload()" class="w-full p-4 bg-red-50 dark:bg-red-900/10 text-red-500 rounded-2xl flex items-center justify-between font-bold text-sm active:scale-95 transition-all">
                    <span class="flex items-center gap-2"><i data-lucide="log-out" class="w-4 h-4"></i> Restart Dashboard</span>
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 glass rounded-full px-6 py-2 shadow-2xl flex items-center gap-8 border-none">
        <button onclick="switchTab('home', 'Beranda')" id="nav-home" class="flex flex-col items-center gap-1 tab-active transition-all">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold">Home</span>
        </button>
        <button onclick="switchTab('add', 'Tambah')" id="nav-add" class="flex flex-col items-center gap-1 text-gray-400 transition-all">
            <i data-lucide="plus-circle" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold">Simpan</span>
        </button>
        <button onclick="switchTab('admin', 'Admin')" id="nav-admin" class="flex flex-col items-center gap-1 text-gray-400 transition-all">
            <i data-lucide="command" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold">Menu</span>
        </button>
    </nav>

    <div id="previewModal" class="fixed inset-0 z-[60] hidden bg-white dark:bg-black flex flex-col">
        <div class="p-4 border-b dark:border-gray-800 flex justify-between items-center bg-white/90 dark:bg-black/90">
            <button onclick="closePreview()" class="text-blue-500 font-bold px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-all">Selesai</button>
            <h3 class="text-sm font-bold opacity-50">PREVIEW MODE</h3>
            <div class="w-16"></div>
        </div>
        <iframe id="previewFrame" class="w-full flex-grow bg-white"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD2DDZnBU78RAwQgXS3ar_T-hjj0r_L65c",
            authDomain: "akun-mlbb.firebaseapp.com",
            projectId: "akun-mlbb",
            storageBucket: "akun-mlbb.firebasestorage.app",
            messagingSenderId: "985001524254",
            appId: "1:985001524254:web:140fa9f44daac050de020f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const codeCol = collection(db, "codes");

        // Global state
        let allData = [];

        // Tab Switch Logic
        window.switchTab = (tab, title) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-blue-500', 'text-gray-400'));
            
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`nav-${tab}`).classList.add('tab-active', 'text-blue-500');
            document.getElementById('pageTitle').innerText = title;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // File Reader
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('codeContent').value = e.target.result;
                document.getElementById('codeTitle').value = file.name.replace(/\.[^/.]+$/, "");
                // Detect extension
                const ext = file.name.split('.').pop();
                if(['html','js','css'].includes(ext)) document.getElementById('codeLang').value = ext;
            };
            reader.readAsText(file);
        };

        // Firestore Operations
        window.saveToFirestore = async () => {
            const id = document.getElementById('editId').value;
            const title = document.getElementById('codeTitle').value;
            const content = document.getElementById('codeContent').value;
            if(!title || !content) return alert("Wajib isi Judul dan Code!");

            const data = {
                title, content,
                language: document.getElementById('codeLang').value,
                tags: document.getElementById('codeTags').value.split(',').map(t => t.trim()),
                cdn: document.getElementById('codeCDN').value,
                updatedAt: Date.now()
            };

            try {
                if(id) {
                    await updateDoc(doc(db, "codes", id), data);
                    alert("Update Berhasil!");
                } else {
                    data.createdAt = Date.now();
                    await addDoc(codeCol, data);
                    alert("Snippet Disimpan!");
                }
                cancelEdit();
                switchTab('home', 'Beranda');
            } catch (err) { alert(err); }
        };

        // Edit Function
        window.startEdit = (id) => {
            const item = allData.find(d => d.id === id);
            if(!item) return;

            document.getElementById('formTitle').innerText = "Edit Snippet";
            document.getElementById('editId').value = id;
            document.getElementById('codeTitle').value = item.title;
            document.getElementById('codeContent').value = item.content;
            document.getElementById('codeLang').value = item.language;
            document.getElementById('codeTags').value = item.tags.join(', ');
            document.getElementById('codeCDN').value = item.cdn || '';
            
            document.getElementById('btnSave').innerText = "Simpan Perubahan";
            document.getElementById('btnCancelEdit').classList.remove('hidden');
            switchTab('add', 'Edit Code');
        };

        window.cancelEdit = () => {
            document.getElementById('formTitle').innerText = "Tambah Code";
            document.getElementById('editId').value = '';
            document.getElementById('codeTitle').value = '';
            document.getElementById('codeContent').value = '';
            document.getElementById('codeCDN').value = '';
            document.getElementById('codeTags').value = '';
            document.getElementById('btnSave').innerText = "Simpan Snippet";
            document.getElementById('btnCancelEdit').classList.add('hidden');
        };

        // Render & Snapshot
        onSnapshot(query(codeCol, orderBy("createdAt", "desc")), (snap) => {
            const grid = document.getElementById('codeGrid');
            allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            document.getElementById('snippetCount').innerText = `${allData.length} Snippets`;
            document.getElementById('statTotal').innerText = allData.length;
            
            grid.innerHTML = '';
            allData.forEach(item => {
                grid.innerHTML += `
                    <div class="ios-card bg-white dark:bg-gray-900 p-6 flex flex-col shadow-sm border border-white dark:border-gray-800">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] font-black px-3 py-1 bg-blue-500/10 text-blue-500 rounded-full uppercase tracking-tighter">${item.language}</span>
                            <div class="flex gap-1">
                                <button onclick="startEdit('${item.id}')" class="p-2 hover:bg-blue-50 dark:hover:bg-blue-900/20 text-blue-400 rounded-full"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="deleteSnippet('${item.id}')" class="p-2 hover:bg-red-50 text-red-400 rounded-full"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <h3 class="font-bold text-gray-900 dark:text-white mb-1 leading-tight">${item.title}</h3>
                        <div class="flex flex-wrap gap-1 mb-6">
                            ${item.tags.map(t => `<span class="text-[9px] text-gray-400 font-medium">#${t}</span>`).join('')}
                        </div>
                        <div class="mt-auto grid grid-cols-5 gap-2">
                            <button onclick="viewPreview('${btoa(unescape(encodeURIComponent(item.content)))}', '${item.cdn}')" class="col-span-4 py-3 bg-blue-500 text-white rounded-2xl text-[11px] font-bold active:scale-95 transition-all shadow-lg shadow-blue-500/20">VIEW PREVIEW</button>
                            <button onclick="copySnippet('${btoa(unescape(encodeURIComponent(item.content)))}')" class="py-3 bg-gray-100 dark:bg-gray-800 rounded-2xl flex items-center justify-center active:scale-95 transition-all"><i data-lucide="copy" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        });

        // Other Utilities
        window.deleteSnippet = async (id) => {
            if(prompt("Admin Password:") === "123admin") {
                await deleteDoc(doc(db, "codes", id));
            }
        };

        window.viewPreview = (base64, cdn) => {
            const code = decodeURIComponent(escape(atob(base64)));
            document.getElementById('previewModal').classList.remove('hidden');
            const cdnTags = cdn ? cdn.split('\n').map(url => `<script src="${url.trim()}"><\/script>`).join('') : '';
            document.getElementById('previewFrame').srcdoc = `<!DOCTYPE html><html><head><script src="https://cdn.tailwindcss.com"><\/script>${cdnTags}</head><body>${code}</body></html>`;
        };

        window.closePreview = () => document.getElementById('previewModal').classList.add('hidden');
        
        window.copySnippet = (base64) => {
            navigator.clipboard.writeText(decodeURIComponent(escape(atob(base64))));
            alert("Berhasil disalin!");
        };

        window.toggleDarkMode = () => document.documentElement.classList.toggle('dark');
        
        lucide.createIcons();
    </script>
</body>
</html>
